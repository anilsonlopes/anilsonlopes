<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 250" width="500" height="250" style="background:#0d1117; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Gradiente do Background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>
    
    <!-- Gradiente Verde (Vue/Nuxt) -->
    <linearGradient id="nuxtGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00dc82" />
      <stop offset="100%" stop-color="#41b883" />
    </linearGradient>

    <!-- Gradiente Laranja (Ableton/Sound) -->
    <linearGradient id="soundGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff7a00" />
      <stop offset="100%" stop-color="#ff5500" />
    </linearGradient>
  </defs>

  <!-- Background Card -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="10"/>
  <rect width="99.2%" height="98.4%" x="0.4%" y="0.8%" fill="none" stroke="#30363d" stroke-width="1.2" rx="10"/>

  <!-- Ondas Sonoras Simbolizando Sound Design/Creative Side (Lado Direito) -->
  <g opacity="0.25">
    <path d="M 330 190 Q 360 90 390 170 T 450 140" fill="none" stroke="url(#soundGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M 310 170 Q 340 210 370 120 T 430 180" fill="none" stroke="url(#nuxtGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Grid Tech de Pontos (Estética UI/UX) -->
  <g fill="#30363d" opacity="0.6">
    <circle cx="440" cy="40" r="1.5"/> <circle cx="460" cy="40" r="1.5"/> <circle cx="480" cy="40" r="1.5"/>
    <circle cx="440" cy="60" r="1.5"/> <circle cx="460" cy="60" r="1.5"/> <circle cx="480" cy="60" r="1.5"/>
    <circle cx="440" cy="80" r="1.5"/> <circle cx="460" cy="80" r="1.5"/> <circle cx="480" cy="80" r="1.5"/>
  </g>

  <!-- Informações Principais -->
  <text x="35" y="70" fill="#f0f6fc" font-size="24" font-weight="800" letter-spacing="-0.5">Anilson Lopes</text>
  <text x="35" y="92" fill="#8b949e" font-size="13" font-weight="500">Frontend Engineer &amp; UI/UX Designer</text>

  <!-- Badges Tecnológicas -->
  <!-- Vue / Nuxt -->
  <g transform="translate(35, 118)">
    <rect width="90" height="22" rx="11" fill="#00dc82" fill-opacity="0.12" stroke="#00dc82" stroke-width="1"/>
    <text x="45" y="15" fill="#00dc82" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="0.5">VUE / NUXT</text>
  </g>

  <!-- Web Performance -->
  <g transform="translate(132, 118)">
    <rect width="130" height="22" rx="11" fill="#58a6ff" fill-opacity="0.12" stroke="#58a6ff" stroke-width="1"/>
    <text x="65" y="15" fill="#58a6ff" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="0.5">WEB PERFORMANCE</text>
  </g>

  <!-- Sound Design -->
  <g transform="translate(35, 148)">
    <rect width="105" height="22" rx="11" fill="#ff7a00" fill-opacity="0.12" stroke="#ff7a00" stroke-width="1"/>
    <text x="52.5" y="15" fill="#ff7a00" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="0.5">SOUND DESIGN</text>
  </g>

  <!-- WSL / Ubuntu -->
  <g transform="translate(147, 148)">
    <rect width="100" height="22" rx="11" fill="#f8e3a1" fill-opacity="0.12" stroke="#f8e3a1" stroke-width="1"/>
    <text x="50" y="15" fill="#f8e3a1" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="0.5">WSL / LINUX</text>
  </g>

  <!-- Localização (Footer) -->
  <g transform="translate(35, 205)">
    <!-- Ícone de Pin Simples -->
    <path d="M5 0 C2.2 0 0 2.2 0 5 C0 8.8 5 14 5 14 C5 14 10 8.8 10 5 C10 2.2 7.8 0 5 0 Z M5 7 C3.9 7 3 6.1 3 5 C3 3.9 3.9 3 5 3 C6.1 3 7 3.9 7 5 C7 6.1 6.1 7 5 7 Z" fill="#8b949e" transform="scale(0.9)"/>
    <text x="14" y="10" fill="#8b949e" font-size="11" font-weight="500">Maceió, AL, BR</text>
  </g>
</svg>
